      <!-- Google Analytics wird ausschließlich nach expliziter Nutzer-Einwilligung

    <body>
      <script>
        // Decode the redirect from 404.html so React Router sees the correct path
        (function(l) {
          if (l.search[1] === '/') {
            var decoded = l.search.slice(1).split('&').map(function(s) {
              return s.replace(/~and~/g, '&');
            }).join('?');
            window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
          }
        }(window.location));
      </script>
